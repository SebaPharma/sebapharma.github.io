  function changeSong() {
    const player = document.getElementById('audioPlayer');
    const playlist = document.getElementById('playlist');
    const selectedSrc = playlist.value;

    if (selectedSrc) {
      player.src = selectedSrc;
      player.load(); // Carga la nueva canción

  }
</script>
